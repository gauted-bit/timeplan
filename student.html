<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ukeplan – Elev</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.p-header { text-align: center; margin-bottom: 1.25rem; }
.p-header h2 { font-family: 'Fraunces', serif; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; }
.p-header .ph-sub { color: var(--muted); font-size: 0.9rem; margin-top: 0.15rem; }
.p-header .ph-class { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-top: 0.5rem; font-family: 'Fraunces', serif; }

.week-nav {
  display: flex; justify-content: center; align-items: center; gap: 1rem; margin-bottom: 1.25rem;
}
.week-nav button {
  padding: 0.45rem 1rem; border: 1px solid var(--border); background: var(--card);
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; border-radius: 6px; transition: all 0.2s; color: var(--text);
}
.week-nav button:hover { border-color: var(--accent); color: var(--accent); }
.week-nav span { font-weight: 700; font-size: 1rem; min-width: 60px; text-align: center; }

.print-btn {
  display: block; margin: 0 auto 1.25rem; padding: 0.6rem 1.5rem;
  background: var(--accent); color: white; border: none; border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer;
}
.print-btn:hover { background: #1d4ed8; }

/* Viktig info */
.p-alerts { display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 0.65rem; }
.p-alert {
  display: flex; align-items: flex-start; gap: 0.4rem;
  padding: 0.35rem 0.65rem; border-radius: var(--radius-sm);
  border: 1px solid var(--warn-border); background: var(--warn-bg);
  font-size: 0.8rem; line-height: 1.35;
}

/* Utstyr */
.equip-strip {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0.75rem 1rem; margin-bottom: 1rem;
}
.equip-strip h3 { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }
.equip-list { display: flex; flex-wrap: wrap; gap: 0.35rem; }
.equip-chip {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.8rem; padding: 0.2rem 0.6rem; background: #f1f0ec; border-radius: 4px; font-weight: 500;
}

/* Kalender */
.p-calendar {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  overflow-x: auto; margin-bottom: 1rem;
}
.p-cal-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 500px; border: 2px solid var(--border); table-layout: fixed; }
.p-cal-table th {
  padding: 0.5rem 0.6rem; background: #faf9f7; font-weight: 700; text-align: center;
  border-bottom: 2px solid var(--border); border-right: 1px solid var(--border-lt);
  font-size: 0.78rem; text-transform: uppercase; color: var(--muted);
}
.p-cal-table th:first-child { width: 55px; }
.p-cal-table th:last-child { border-right: none; }
.p-cal-table td {
  padding: 0.45rem 0.55rem; text-align: left;
  border-bottom: 1px solid var(--border-lt); border-right: 1px solid var(--border-lt);
}
.p-cal-table td:first-child { font-weight: 700; color: var(--muted); text-align: center; background: #faf9f7; }
.p-cal-table td:last-child { border-right: none; }
.p-cal-table tr:last-child td { border-bottom: none; }
.p-cal-table td.has-ev { white-space: pre-wrap; }
.cal-subj-tag {
  display: inline; font-size: 0.78rem; font-weight: 700; padding: 0.1rem 0.35rem;
  border-radius: 3px; white-space: nowrap;
}

/* Dagblokker */
.day-block { margin-bottom: 0.9rem; }
.day-strip { display: flex; align-items: center; gap: 0.65rem; margin-bottom: 0.4rem; }
.day-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.day-lbl { font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.05rem; }
.day-dt { font-size: 0.82rem; color: var(--muted); }
.day-rule { flex: 1; height: 1px; background: var(--border); }

.hw-cards { display: flex; flex-direction: column; gap: 0.4rem; }
.hw-card {
  display: flex; gap: 0.75rem; align-items: flex-start;
  padding: 0.7rem 0.85rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm);
}
.hw-tag {
  font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
  padding: 0.15rem 0.45rem; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 2px;
}
.hw-body { flex: 1; }
.hw-body-text { font-size: 0.88rem; white-space: pre-wrap; }
.hw-body-meta { font-size: 0.76rem; color: var(--muted); margin-top: 0.15rem; }
.hw-empty {
  padding: 0.9rem; text-align: center; color: var(--muted); font-size: 0.88rem;
  background: var(--card); border: 1px dashed var(--border); border-radius: var(--radius-sm);
}

/* Tema-kort */
.tema-section { margin-bottom: 1rem; }
.tema-section h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.4rem; color: var(--accent); }
.tema-cards { display: flex; flex-direction: column; gap: 0.4rem; }
.tema-card {
  display: flex; gap: 0.75rem; align-items: flex-start;
  padding: 0.7rem 0.85rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm);
}

/* Lekser-seksjon overskrift */
.lekser-header {
  display: flex; align-items: center; gap: 0.5rem;
  margin-top: 1.2rem; margin-bottom: 0.75rem;
}
.lekser-header h3 {
  font-size: 1.1rem; font-weight: 700;
  display: flex; align-items: center; gap: 0.4rem;
  margin: 0; color: var(--accent);
}
.lekser-header .day-rule { flex: 1; height: 1px; background: var(--border); }

/* Avhukingsboks for lekser */
.hw-check {
  flex-shrink: 0; margin-top: 3px;
  width: 18px; height: 18px; cursor: pointer;
  accent-color: var(--accent);
}
.hw-card.checked {
  opacity: 0.5;
}
.hw-card.checked .hw-body-text {
  text-decoration: line-through;
  color: var(--muted);
}

/* Timeplan-visning */
.tp-section { margin-bottom: 1rem; }
.tp-section h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--accent); }
.tp-table {
  width: 100%; border-collapse: collapse;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
}
.tp-table th {
  padding: 0.45rem 0.4rem; text-align: center; font-size: 0.75rem; font-weight: 700;
  text-transform: uppercase; color: var(--muted); background: #faf9f7;
  border-bottom: 2px solid var(--border);
}
.tp-table td {
  padding: 0.3rem; border-bottom: 1px solid var(--border-lt); vertical-align: top; text-align: center;
}
.tp-table tr:last-child td { border-bottom: none; }
.tp-cell {
  border-radius: 5px; padding: 0.3rem 0.35rem; min-height: 2.2rem;
}
.tp-cell-subj { font-size: 0.76rem; font-weight: 700; }
.tp-cell-time { font-size: 0.68rem; color: rgba(0,0,0,0.55); }
.tp-cell-teacher { font-size: 0.66rem; color: rgba(0,0,0,0.45); margin-top: 0.1rem; }

@media(max-width:600px) {
  .tp-table { display: block; overflow-x: auto; }
}

.no-access { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.no-access h2 { font-family: 'Fraunces', serif; font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--text); }

@media print {
  body { background: #fff; }
  .topbar { position: static; background: #1e293b !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .week-nav, .print-btn, .btn-logout { display: none; }
  .lekser-header { page-break-before: always; }
  .hw-tag, .equip-chip, .p-alert, .cal-subj-tag { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .p-cal-table { border: 2px solid #333; }
  .p-cal-table th { border-bottom: 2px solid #333; border-right: 1px solid #999; background: #f0f0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .p-cal-table td { border-bottom: 1px solid #999; border-right: 1px solid #999; }
  .p-cal-table td:first-child { background: #f0f0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .p-cal-table td:last-child { border-right: none; }
  .p-cal-table th:last-child { border-right: none; }
  .p-cal-table tr:last-child td { border-bottom: none; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:0.88rem;">Laster...</div>
</div>

<div class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="topbar-title" id="topbar-title">Ukeplan</div>
      <div class="topbar-sub" id="school-sub"></div>
    </div>
    <div class="topbar-right" id="auth-topbar"></div>
  </div>
</div>

<div class="main">
  <div id="no-access" class="no-access" style="display:none">
    <h2>Ingen klasse tildelt</h2>
    <p>Administrator m&aring; tildele deg en klasse f&oslash;r du kan se ukeplanen.</p>
  </div>

  <div id="student-content" style="display:none">
    <div class="p-header fade-in">
      <h2 id="week-title">Ukeplan</h2>
      <div class="ph-sub" id="week-range"></div>
      <div class="ph-class" id="class-name"></div>
    </div>

    <div class="week-nav">
      <button onclick="prevWeek()">&larr; Forrige uke</button>
      <span id="week-label">Uke 1</span>
      <button onclick="nextWeek()">Neste uke &rarr;</button>
    </div>

    <button class="print-btn" onclick="window.print()">Skriv ut</button>

    <div id="content-area"></div>
  </div>
</div>

<div class="toast" id="toast">Lagret!</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="auth.js"></script>
<script src="data.js"></script>

<script>
const DAYS = ['Mandag', 'Tirsdag', 'Onsdag', 'Torsdag', 'Fredag'];
const MONTHS = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
const SUBJECT_COLORS = [
  { bg:'#fef08a', fg:'#854d0e' }, { bg:'#fecaca', fg:'#991b1b' },
  { bg:'#a7f3d0', fg:'#065f46' }, { bg:'#bfdbfe', fg:'#1e3a8a' },
  { bg:'#f5d0fe', fg:'#86198f' }, { bg:'#86efac', fg:'#14532d' },
  { bg:'#fed7aa', fg:'#9a3412' }, { bg:'#fbcfe8', fg:'#9d174d' },
  { bg:'#7dd3fc', fg:'#0c4a6e' }, { bg:'#d8b4fe', fg:'#581c87' },
  { bg:'#67e8f9', fg:'#164e63' }, { bg:'#d9f99d', fg:'#365314' },
  { bg:'#d4d4d8', fg:'#3f3f46' }, { bg:'#fde68a', fg:'#92400e' },
  { bg:'#c7d2fe', fg:'#3730a3' }, { bg:'#fca5a5', fg:'#7f1d1d' },
  { bg:'#a5f3fc', fg:'#155e75' }, { bg:'#e9d5ff', fg:'#6b21a8' },
  { bg:'#bef264', fg:'#3f6212' }, { bg:'#fdba74', fg:'#7c2d12' },
  { bg:'#f0abfc', fg:'#701a75' }, { bg:'#99f6e4', fg:'#134e4a' },
  { bg:'#fcd34d', fg:'#78350f' },
];

const session = checkAuth('student');
if (!session) throw new Error('Ikke autorisert');

document.getElementById('auth-topbar').innerHTML = renderAuthTopbar(session);

let assignedClassId = null;
let assignedClassName = '';
let subjects = [];
let currentWeek = 1;
let schoolName = '';
let timetableData = [];

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
async function init() {
  try {
    schoolName = await DataService.getSchoolName();
    document.getElementById('school-sub').textContent = schoolName;

    // Hent tildelt klasse
    assignedClassId = await DataService.getStudentAssignment(session.username);

    if (!assignedClassId) {
      document.getElementById('no-access').style.display = '';
      document.getElementById('student-content').style.display = 'none';
      hideLoading();
      return;
    }

    const allClasses = await DataService.getClasses();
    const cls = allClasses.find(c => c.id === assignedClassId);
    if (!cls) {
      document.getElementById('no-access').style.display = '';
      document.getElementById('student-content').style.display = 'none';
      hideLoading();
      return;
    }

    assignedClassName = cls.name;
    document.getElementById('class-name').textContent = 'Klasse: ' + assignedClassName;
    document.getElementById('no-access').style.display = 'none';
    document.getElementById('student-content').style.display = '';

    // Last fag og timeplan
    subjects = await DataService.getSubjects(assignedClassId);
    timetableData = await DataService.getTimetable(assignedClassId);

    // Sett uke
    initializeWeek();
    await loadWeekplan();
    hideLoading();
  } catch (err) {
    console.error('Feil ved lasting:', err);
    hideLoading();
    showToast('Feil ved lasting av data');
  }
}

function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}

// ═══════════════════════════════════════
//  UKE-NAVIGASJON
// ═══════════════════════════════════════
function getISOWeekNumber(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const ys = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - ys) / 864e5 + 1) / 7);
}

function initializeWeek() {
  currentWeek = getISOWeekNumber(new Date()) + 1;
  updateWeekDisplay();
}

function updateWeekDisplay() {
  document.getElementById('week-label').textContent = 'Uke ' + currentWeek;
  document.getElementById('week-title').textContent = 'Ukeplan \u2013 Uke ' + currentWeek;
  document.getElementById('topbar-title').textContent = 'Ukeplan \u2013 Uke ' + currentWeek;
}

function prevWeek() {
  if (currentWeek > 1) {
    currentWeek--;
    updateWeekDisplay();
    loadWeekplan();
  }
}

function nextWeek() {
  if (currentWeek < 52) {
    currentWeek++;
    updateWeekDisplay();
    loadWeekplan();
  }
}

function getWeekDates(weekNum) {
  const y = new Date().getFullYear();
  const j4 = new Date(y, 0, 4);
  const dow = j4.getDay() || 7;
  const mw1 = new Date(j4);
  mw1.setDate(j4.getDate() - dow + 1);
  const mon = new Date(mw1);
  mon.setDate(mw1.getDate() + (weekNum - 1) * 7);
  const dates = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function fmtDate(d) {
  return d.getDate() + '.' + (d.getMonth() + 1);
}

function fmtRange(dates) {
  if (dates.length < 5) return '';
  const s = dates[0];
  const e = dates[4];
  return s.getDate() + '. ' + MONTHS[s.getMonth()] + ' \u2013 ' + e.getDate() + '. ' + MONTHS[e.getMonth()];
}

// ═══════════════════════════════════════
//  LASTE UKEPLAN
// ═══════════════════════════════════════
async function loadWeekplan() {
  try {
    const [data, calData] = await Promise.all([
      DataService.getWeekplan(assignedClassId, currentWeek),
      DataService.getCalendar(assignedClassId)
    ]);
    const dates = getWeekDates(currentWeek);
    document.getElementById('week-range').textContent = fmtRange(dates) + ' \u00b7 ' + schoolName;

    renderStudentView(data, dates, calData);
  } catch (err) {
    console.error('Feil ved lasting av ukeplan:', err);
    showToast('Feil ved lasting');
  }
}

function renderStudentView(data, dates, calData) {
  const area = document.getElementById('content-area');

  if (!data && (!calData || Object.keys(calData).length === 0)) {
    area.innerHTML = '<div class="empty-state fade-in"><h3>Ingen ukeplan publisert</h3><p>L\u00e6reren har ikke lagt inn ukeplan for denne uken enda.</p></div>';
    return;
  }

  let html = '';

  // Viktig informasjon
  const info = (data && data.infoText) || '';
  if (info.trim()) {
    html += '<div class="p-alerts fade-in">';
    info.split('\n').filter(l => l.trim()).forEach(line => {
      html += `<div class="p-alert"><span>\ud83d\udccc</span><span>${esc(line)}</span></div>`;
    });
    html += '</div>';
  }

  // Utstyr
  const eqItems = [];
  subjects.forEach((s, si) => {
    const sd = data && data.subjects ? data.subjects[si] : null;
    const eq = sd ? sd.equip : s.equip;
    if (eq && eq.trim()) {
      const color = SUBJECT_COLORS[s.colorIdx] || SUBJECT_COLORS[0];
      eqItems.push({ name: s.name, color, text: eq });
    }
  });

  if (eqItems.length) {
    html += '<div class="equip-strip fade-in"><h3>Utstyr</h3><div class="equip-list">';
    eqItems.forEach(e => {
      html += `<span class="equip-chip"><span class="hw-tag" style="background:${e.color.bg};color:${e.color.fg};margin:0">${esc(e.name)}</span> ${esc(e.text)}</span>`;
    });
    html += '</div></div>';
  }

  // Kalender fra separat lagring (absolutte ukenummer)
  let hasCalData = false;
  if (calData) {
    for (let r = 0; r < 4 && !hasCalData; r++) {
      for (let c = 0; c < 5 && !hasCalData; c++) {
        const val = calData[(currentWeek + r) + '_' + c];
        if (val && val.trim()) hasCalData = true;
      }
    }
  }
  // Fallback til gammelt format (kalender lagret inne i ukeplanen)
  if (!hasCalData && data && data.calendar) {
    hasCalData = Object.values(data.calendar).some(v => v && v.trim());
  }
  if (hasCalData) {
    html += '<div class="p-calendar fade-in"><table class="p-cal-table"><thead><tr>';
    html += '<th>Uke</th><th>Man</th><th>Tir</th><th>Ons</th><th>Tor</th><th>Fre</th>';
    html += '</tr></thead><tbody>';
    for (let r = 0; r < 4; r++) {
      html += `<tr><td>${currentWeek + r}</td>`;
      for (let c = 0; c < 5; c++) {
        // Prøv nytt format først, fall tilbake til gammelt
        let val = calData ? (calData[(currentWeek + r) + '_' + c] || '') : '';
        if (!val && data && data.calendar) val = data.calendar[r + '_' + c] || '';
        html += `<td class="${val ? 'has-ev' : ''}">${highlightSubjectInText(val)}</td>`;
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  }

  // Timeplan
  if (timetableData.length > 0) {
    html += '<div class="tp-section fade-in"><h3>Timeplan</h3>';
    html += '<table class="tp-table"><thead><tr>';
    DAYS.forEach(d => { html += `<th>${d}</th>`; });
    html += '</tr></thead><tbody>';
    timetableData.forEach(row => {
      html += '<tr>';
      DAYS.forEach(day => {
        const slot = (row.slots && row.slots[day]) || {};
        const entries = slotEntries(slot);
        const tf = slot.timeFrom || '';
        const tt = slot.timeTo || '';
        html += '<td>';
        if (entries.length > 0 || tf) {
          if (tf) {
            html += `<div class="tp-cell-time">${esc(tf)}${tt ? '\u2013' + esc(tt) : ''}</div>`;
          }
          entries.forEach(entry => {
            if (!entry.subjectName) return;
            const subj = subjects.find(s => s.name === entry.subjectName);
            const color = subj ? (SUBJECT_COLORS[subj.colorIdx] || SUBJECT_COLORS[0]) : null;
            const bgStyle = color ? `background:${color.bg};` : '';
            const fgStyle = color ? `color:${color.fg};` : '';
            html += `<div class="tp-cell" style="${bgStyle}margin-bottom:0.15rem;">`;
            html += `<div class="tp-cell-subj" style="${fgStyle}">${esc(entry.subjectName)}</div>`;
            if (entry.teacher) html += `<div class="tp-cell-teacher" style="${fgStyle}">${esc(entry.teacher)}</div>`;
            html += '</div>';
          });
        }
        html += '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  }

  // Tema-oversikt
  const temaItems = [];
  subjects.forEach((s, si) => {
    const sd = data && data.subjects ? data.subjects[si] : null;
    if (!sd || !sd.groups) return;
    const color = SUBJECT_COLORS[s.colorIdx] || SUBJECT_COLORS[0];
    s.groups.forEach((g, gi) => {
      const gd = sd.groups[gi];
      if (gd && gd.tema && gd.tema.trim()) {
        temaItems.push({ subj: s.name, group: g.name, color, tema: gd.tema });
      }
    });
  });

  if (temaItems.length) {
    html += '<div class="tema-section fade-in"><h3>Tema denne uken</h3><div class="tema-cards">';
    temaItems.forEach(t => {
      html += `<div class="tema-card">
        <span class="hw-tag" style="background:${t.color.bg};color:${t.color.fg}">${esc(t.subj)}</span>
        <div class="hw-body">
          <div class="hw-body-text">${esc(t.tema)}</div>
          <div class="hw-body-meta">${esc(t.group)}</div>
        </div>
      </div>`;
    });
    html += '</div></div>';
  }

  // Lekser per dag
  const hwByDay = {};
  DAYS.forEach(d => hwByDay[d] = []);

  subjects.forEach((s, si) => {
    const sd = data && data.subjects ? data.subjects[si] : null;
    if (!sd || !sd.groups) return;
    const color = SUBJECT_COLORS[s.colorIdx] || SUBJECT_COLORS[0];
    s.groups.forEach((g, gi) => {
      const gd = sd.groups[gi];
      if (gd && gd.hw && gd.hw.trim() && gd.day) {
        hwByDay[gd.day].push({
          subj: s.name,
          color,
          text: gd.hw,
          group: g.name,
          teachers: g.teachers
        });
      }
    });
  });

  // Overskrift for lekser-seksjonen
  html += `<div class="lekser-header fade-in">
    <h3>Lekser</h3>
    <div class="day-rule"></div>
  </div>`;

  DAYS.forEach((day, di) => {
    const dt = dates[di] ? fmtDate(dates[di]) : '';
    html += `<div class="day-block fade-in">
      <div class="day-strip">
        <span class="day-dot"></span>
        <span class="day-lbl">${day}</span>
        <span class="day-dt">${dt}</span>
        <div class="day-rule"></div>
      </div>`;

    const items = hwByDay[day];
    if (!items.length) {
      html += '<div class="hw-empty">Ingen lekse til denne dagen</div>';
    } else {
      html += '<div class="hw-cards">';
      items.forEach((it, idx) => {
        const hwId = `hw-${currentWeek}-${day}-${idx}`;
        const isChecked = getHwChecked(hwId);
        html += `<div class="hw-card${isChecked ? ' checked' : ''}" id="card-${hwId}">
          <input type="checkbox" class="hw-check" ${isChecked ? 'checked' : ''} onchange="toggleHw('${hwId}', this.checked)">
          <span class="hw-tag" style="background:${it.color.bg};color:${it.color.fg}">${esc(it.subj)}</span>
          <div class="hw-body">
            <div class="hw-body-text">${esc(it.text)}</div>
            <div class="hw-body-meta">${esc(it.group)}${it.teachers ? ' \u00b7 ' + esc(it.teachers) : ''}</div>
          </div>
        </div>`;
      });
      html += '</div>';
    }

    html += '</div>';
  });

  area.innerHTML = html;
}

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
function highlightSubjectInText(text) {
  if (!text || !text.trim()) return esc(text);
  return text.split('\n').map(function(line) {
    if (!line.trim()) return '';
    const lower = line.toLowerCase();
    let bestSubj = null;
    let bestLen = 0;
    let bestColor = null;
    subjects.forEach(s => {
      const sName = s.name.toLowerCase();
      if (lower.includes(sName) && sName.length > bestLen) {
        bestSubj = s;
        bestColor = SUBJECT_COLORS[s.colorIdx] || SUBJECT_COLORS[0];
        bestLen = sName.length;
      }
    });
    if (!bestSubj) return esc(line);
    const idx = lower.indexOf(bestSubj.name.toLowerCase());
    const before = line.substring(0, idx);
    const match = line.substring(idx, idx + bestSubj.name.length);
    const after = line.substring(idx + bestSubj.name.length);
    return esc(before) + '<span class="cal-subj-tag" style="background:' + bestColor.bg + ';color:' + bestColor.fg + '">' + esc(match) + '</span>' + esc(after);
  }).join('<br>');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Bakoverkompatibilitet: konverter gammelt slot-format til entries-array
function slotEntries(slot) {
  if (slot.entries) return slot.entries;
  if (slot.subjectName) return [{ subjectName: slot.subjectName, teacher: slot.teacher || '' }];
  return [];
}

// Avhuking av lekser (lagres lokalt)
function getHwChecked(hwId) {
  const stored = JSON.parse(localStorage.getItem('ukeplan-hw-checked') || '{}');
  return !!stored[hwId];
}

function toggleHw(hwId, checked) {
  const stored = JSON.parse(localStorage.getItem('ukeplan-hw-checked') || '{}');
  if (checked) {
    stored[hwId] = true;
  } else {
    delete stored[hwId];
  }
  localStorage.setItem('ukeplan-hw-checked', JSON.stringify(stored));
  const card = document.getElementById('card-' + hwId);
  if (card) {
    card.classList.toggle('checked', checked);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Init
init();
</script>
